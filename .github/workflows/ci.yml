name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic pandas pyarrow pytest httpx

      - name: Run API tests
        run: pytest -q tests/test_api.py
